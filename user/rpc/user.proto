syntax = "proto3"; // 指定 proto 版本

package user; // 指定包名

// 编译命令
// protoc --go_out=. --go-grpc_out=. user.proto
// --go_out=. 生成go文件
// --go-grpc_out=. 生成grpc文件
// user.proto 指定proto文件
// . 指定生成文件目录

option go_package = "./user"; // 指定生成的go文件包名

// 定义 user 服务名
service User {
  // 获取用户信息
  rpc GetUser (GetUserReq) returns (GetUserResp) {}
}

// 定义请求结构体
message GetUserReq {
  // 属性类型 属性名 = 标识符
  int32 id = 1;
}

// 定义响应结构体
message GetUserResp {
  int32 id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
}